# STING — Drug Repositioning DSS · TÜBİTAK 123E383
# https://sting.tubitak.sdu.edu.tr
#
# Çalıştırma: proje kökünden (STING_DSS/)
#   docker compose -f docker/docker-compose.yml up --build
# Ya da bu dosyayı proje köküne taşıyıp:
#   docker compose up --build

name: sting-dss

services:
  backend:
    build: ../backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --timeout-keep-alive 600
    ports:
      - "8001:8000"
    volumes:
      - ../backend:/app
      - ../backend/models:/app/models
      - ../backend/data:/app/data
    environment:
      - DEBUG=false
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ../frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    restart: unless-stopped

  worker:
    build: ../backend
    command: celery -A app.worker worker --loglevel=info
    volumes:
      - ../backend:/app
      - ../backend/models:/app/models
      - ../backend/data:/app/data
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped
